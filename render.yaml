services:
  - type: web
    name: skillnet
    env: node
    buildCommand: npm ci && npm run build:production
    startCommand: node server/dist/index.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false
